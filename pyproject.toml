[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short --ignore=tests/live"
asyncio_mode = "auto"
pythonpath = ["."]

markers = [
    "live: live integration tests requiring real API keys (Binance testnet)",
    "network: integration tests requiring internet access (no API keys needed)",
]
