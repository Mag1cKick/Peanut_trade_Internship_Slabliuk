repos:
  # ── Detect secrets before they ever reach Git ────────────────────────────
  # Uses a local Python script for Windows compatibility — avoids the
  # detect-secrets-hook.exe path/version issues on Windows.
  - repo: local
    hooks:
      - id: detect-secrets
        name: detect-secrets
        entry: python scripts/check_secrets_baseline.py
        language: system
        pass_filenames: false
        always_run: true

  # ── Block .env files from being committed ────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # ── Lint & format with ruff ───────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ── Tests must pass before every commit ──────────────────────────────────
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -v --tb=short
        language: system
        pass_filenames: false
        always_run: true
