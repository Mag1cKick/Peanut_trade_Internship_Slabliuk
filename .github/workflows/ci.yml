name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # ── Secrets check ────────────────────────────────────────────────────
      - name: Check for accidentally committed secrets
        run: |
          if grep -rE "(API_KEY|API_SECRET|PRIVATE_KEY)\s*=\s*['\"][^'\"]{8,}" src/ tests/ configs/ --include="*.py" --include="*.yaml" --include="*.json"; then
            echo "❌  Possible hardcoded secret detected. Use environment variables."
            exit 1
          fi
          echo "✅  No hardcoded secrets found."

      # ── Lint ─────────────────────────────────────────────────────────────
      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
        env:
          # Provide dummy env vars so the bot initialises without real secrets
          API_KEY: ${{ secrets.API_KEY || 'ci-placeholder' }}
          API_SECRET: ${{ secrets.API_SECRET || 'ci-placeholder' }}
          ENVIRONMENT: ci
