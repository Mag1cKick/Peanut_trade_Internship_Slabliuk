name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # ── Secrets check ─────────────────────────────────────────────────────
      - name: Check for accidentally committed secrets
        run: python scripts/check_secrets_baseline.py

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: Lint (ruff)
        run: python -m ruff check core/ chain/ tests/

      - name: Format check (ruff)
        run: python -m ruff format --check core/ chain/ tests/

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov=core --cov=chain --cov-report=term-missing
